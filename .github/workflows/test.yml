name: Run Tests on Push
'on':
  push:
    branches:
      - main
      - Production
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - name: Install Dependencies
        run: npm ci
      - name: Run Tests
        run: npm run test
      - name: Lint
        run: npm run lint
